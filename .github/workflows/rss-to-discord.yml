name: RSS to Discord

on:
  workflow_dispatch:
  schedule:
    - cron: "*/15 * * * *"

permissions:
  contents: write

jobs:
  post-rss:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run RSS poster
        env:
          RSS_FEED_URL: ${{ secrets.RSS_FEED_URL }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          WEBHOOK_USERNAME: FitGirl RSS
          MAX_POSTS_PER_RUN: "5"
          FIRST_RUN_MODE: "latest"
          EMBED_COLOR: "16711808"
          SHOW_THUMBNAIL: "true"
          SHOW_TIMESTAMP: "true"
          SUMMARY_LIMIT: "500"
        run: python rss_to_discord.py

      - name: Commit updated state
        run: |
          if [ ! -f .rss_state.json ]; then
            echo "No state file yet"
            exit 0
          fi

          if git diff --quiet .rss_state.json; then
            echo "No state changes"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .rss_state.json
          git commit -m "Update RSS state"
          git push
