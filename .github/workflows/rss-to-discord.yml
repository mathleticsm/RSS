name: RSS to Discord

on:
  workflow_dispatch:
    inputs:
      first_run_mode:
        description: "First-run behavior"
        required: true
        type: choice
        options:
          - seed
          - latest
          - all
        default: latest
      max_posts_per_run:
        description: "How many new feed items to post this run"
        required: true
        type: string
        default: "2"
      multi_game_embeds_limit:
        description: "Max game cards taken from one feed item"
        required: true
        type: string
        default: "8"
      steam_lookups_limit:
        description: "Max Steam lookups per run"
        required: true
        type: string
        default: "6"
      summary_limit:
        description: "Embed summary length"
        required: true
        type: string
        default: "140"
      mention_text:
        description: "Optional message prefix for this manual run"
        required: false
        type: string
        default: ""
      reset_state:
        description: "Delete .rss_state.json before running"
        required: true
        type: boolean
        default: false

  schedule:
    - cron: "7,22,37,52 * * * *"

permissions:
  contents: write

concurrency:
  group: rss-to-discord-${{ github.repository }}
  cancel-in-progress: false

jobs:
  post-rss:
    name: Fetch RSS and post to Discord
    runs-on: ubuntu-latest
    timeout-minutes: 10

    env:
      RSS_FEED_URL: ${{ secrets.RSS_FEED_URL }}
      DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}

      WEBHOOK_USERNAME: FitGirl Premium
      WEBHOOK_AVATAR_URL: ""
      MENTION_TEXT: ""

      EMBED_COLOR: "10181046"
      SHOW_TIMESTAMP: "true"
      SHOW_SOURCE_LINK: "true"
      SHOW_STEAM_LINKS: "true"

      REQUEST_TIMEOUT: "30"
      POST_DELAY_SECONDS: "1"
      STEAM_REQUEST_DELAY_SECONDS: "0.6"

      SEEN_IDS_LIMIT: "500"
      INCLUDE_KEYWORDS: ""
      EXCLUDE_KEYWORDS: ""

      FIRST_RUN_MODE: "latest"
      MAX_POSTS_PER_RUN: "2"
      MULTI_GAME_EMBEDS_LIMIT: "8"
      STEAM_LOOKUPS_LIMIT: "6"
      SUMMARY_LIMIT: "140"

    steps:
      - name: Check out repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: requirements.txt

      - name: Apply manual-run overrides
        if: github.event_name == 'workflow_dispatch'
        shell: bash
        run: |
          echo "FIRST_RUN_MODE=${{ inputs.first_run_mode }}" >> "$GITHUB_ENV"
          echo "MAX_POSTS_PER_RUN=${{ inputs.max_posts_per_run }}" >> "$GITHUB_ENV"
          echo "MULTI_GAME_EMBEDS_LIMIT=${{ inputs.multi_game_embeds_limit }}" >> "$GITHUB_ENV"
          echo "STEAM_LOOKUPS_LIMIT=${{ inputs.steam_lookups_limit }}" >> "$GITHUB_ENV"
          echo "SUMMARY_LIMIT=${{ inputs.summary_limit }}" >> "$GITHUB_ENV"
          {
            echo "MENTION_TEXT<<EOF"
            echo "${{ inputs.mention_text }}"
            echo "EOF"
          } >> "$GITHUB_ENV"

      - name: Validate required secrets
        shell: bash
        run: |
          missing=0

          if [ -z "${RSS_FEED_URL}" ]; then
            echo "::error::Missing repository secret RSS_FEED_URL"
            missing=1
          fi

          if [ -z "${DISCORD_WEBHOOK_URL}" ]; then
            echo "::error::Missing repository secret DISCORD_WEBHOOK_URL"
            missing=1
          fi

          if [ "$missing" -ne 0 ]; then
            exit 1
          fi

      - name: Reset state file
        if: github.event_name == 'workflow_dispatch' && inputs.reset_state
        shell: bash
        run: |
          rm -f .rss_state.json
          echo "Deleted .rss_state.json"

      - name: Show effective configuration
        shell: bash
        run: |
          echo "Workflow event: ${{ github.event_name }}"
          echo "Branch: ${{ github.ref_name }}"
          echo "FIRST_RUN_MODE=$FIRST_RUN_MODE"
          echo "MAX_POSTS_PER_RUN=$MAX_POSTS_PER_RUN"
          echo "MULTI_GAME_EMBEDS_LIMIT=$MULTI_GAME_EMBEDS_LIMIT"
          echo "STEAM_LOOKUPS_LIMIT=$STEAM_LOOKUPS_LIMIT"
          echo "SUMMARY_LIMIT=$SUMMARY_LIMIT"
          echo "RSS_FEED_URL configured: yes"
          echo "DISCORD_WEBHOOK_URL configured: yes"

      - name: Upgrade pip
        shell: bash
        run: python -m pip install --upgrade pip

      - name: Install dependencies
        shell: bash
        run: pip install -r requirements.txt

      - name: Run RSS poster
        shell: bash
        run: python rss_to_discord.py

      - name: Print state summary
        if: always()
        shell: bash
        run: |
          if [ -f .rss_state.json ]; then
            echo "State file found."
            ls -lh .rss_state.json
            python -c "import json; from pathlib import Path; data=json.loads(Path('.rss_state.json').read_text(encoding='utf-8')); print('State preview:'); print({'version': data.get('version'), 'feed_title': data.get('feed_title'), 'last_status': data.get('last_status'), 'last_posted_ids': data.get('last_posted_ids', []), 'last_run_at': data.get('last_run_at')})"
          else
            echo "No .rss_state.json file present."
          fi

      - name: Commit updated RSS state
        if: always()
        shell: bash
        run: |
          if [ ! -f .rss_state.json ]; then
            echo "No state file to commit."
            exit 0
          fi

          if [ -z "$(git status --porcelain -- .rss_state.json)" ]; then
            echo "No state changes to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git pull --rebase origin "${GITHUB_REF_NAME}" || true
          git add .rss_state.json
          git commit -m "Update RSS state"
          git push
